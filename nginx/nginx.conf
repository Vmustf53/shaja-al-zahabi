# ══════════════════════════════════════════════════════════════════════════════
# SHAJA-AL-ZAHABI — Nginx API Gateway
# Single entry point routing to all microservices by path prefix
# ══════════════════════════════════════════════════════════════════════════════

events {
  worker_connections 1024;
}

http {
  log_format main '$remote_addr - $request_time - "$request" $status';
  access_log /dev/stdout main;
  error_log /dev/stderr warn;

  # ── Inventory Service ──────────────────────────────────────────────────────
  upstream inventory_backend {
    server inventory-service:3001;
  }

  # ── POS Service ─────────────────────────────────────────────────────────────
  upstream pos_backend {
    server pos-service:3002;
  }

  # ── CRM Service ──────────────────────────────────────────────────────────────
  upstream crm_backend {
    server crm-service:3003;
  }

  server {
    listen 80;

    # Health check for the gateway itself
    location /health {
      return 200 '{"status":"healthy","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

    # Route /api/inventory/* → inventory-service
    location /api/inventory/ {
      rewrite ^/api/inventory/(.*)$ /$1 break;
      proxy_pass http://inventory_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/pos/* → pos-service
    location /api/pos/ {
      rewrite ^/api/pos/(.*)$ /$1 break;
      proxy_pass http://pos_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/crm/* → crm-service
    location /api/crm/ {
      rewrite ^/api/crm/(.*)$ /$1 break;
      proxy_pass http://crm_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
