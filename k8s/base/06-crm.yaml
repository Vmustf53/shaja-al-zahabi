# ══════════════════════════════════════════════════════════════════════════════
# crm-service — Deployment + Service
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-deployment
  namespace: shaja
  labels:
    app: crm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      containers:
        - name: crm-service
          image: shaja-al-zahabi-crm-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: shaja-secrets, key: DB_PASSWORD } }
          readinessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: crm-service
  namespace: shaja
spec:
  selector:
    app: crm-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
