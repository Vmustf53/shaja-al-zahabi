# ══════════════════════════════════════════════════════════════════════════════
# Secret — the database password, never committed in plaintext to Git in real use
# DevOps Learning: This file is fine to commit for LOCAL learning since it's a
# throwaway dev password. In Phase 1.3+, this gets replaced with a value injected
# at deploy time (sealed-secrets, SOPS, or a CI/CD secret store) — never plaintext
# in a real repo. For now, base64 encoding is NOT encryption — it's just the
# required K8s Secret format. Treat this file as sensitive going forward.
#
# To generate the base64 value yourself:
#   echo -n 'shaja_dev_password_2026' | base64
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: shaja-secrets
  namespace: shaja
type: Opaque
data:
  # "shaja_dev_password_2026" base64-encoded — local dev only
  DB_PASSWORD: c2hhamFfZGV2X3Bhc3N3b3JkXzIwMjY=
