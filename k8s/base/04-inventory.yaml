# ══════════════════════════════════════════════════════════════════════════════
# inventory-service — Deployment + Service
# DevOps Learning: A Deployment manages a ReplicaSet of identical, disposable
# pods. If a pod crashes, Kubernetes automatically replaces it — this is
# "self-healing", one of the core reasons Kubernetes exists.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-deployment
  namespace: shaja
  labels:
    app: inventory-service
spec:
  replicas: 1                 # single replica for local learning; bump in prod
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: shaja-al-zahabi-inventory-service:latest
          imagePullPolicy: IfNotPresent   # use locally-built image, don't pull from registry
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: shaja-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: shaja-secrets, key: DB_PASSWORD } }
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: shaja
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP    # internal only — reached via Ingress, never directly from outside
