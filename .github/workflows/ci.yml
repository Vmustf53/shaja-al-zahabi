# ══════════════════════════════════════════════════════════════════════════════
# SHAJA-AL-ZAHABI — CI Pipeline
# Triggers: every push to any branch + every pull request targeting main
#
# DevOps Learning: This is your automated quality gate. Nothing reaches main
# without passing lint + tests + Docker build first. Every interview question
# about CI/CD traces back to a workflow file exactly like this one.
#
# Stages:
#   1. test     — lint (ESLint) + unit tests (Jest) for all 3 services in parallel
#   2. build    — Docker multi-platform build (linux/amd64 + linux/arm64)
#                 proves the image works on your M1 AND future VPS (x86_64)
#   3. security — npm audit for known vulnerabilities (good portfolio practice)
# ══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: ["**"]          # every branch — catch issues early
  pull_request:
    branches: [main]          # all PRs targeting main must pass this

jobs:

  # ── Job 1: Test all three services in parallel ──────────────────────────────
  test:
    name: "Test — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory, pos, crm]
      fail-fast: false         # don't cancel other services if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test
        env:
          NODE_ENV: test

  # ── Job 2: Docker multi-platform build ──────────────────────────────────────
  # DevOps Learning: buildx builds for BOTH arm64 (your M1) and amd64 (VPS/cloud)
  # in one step. The image isn't pushed to a registry yet (Phase 1.2 scope is
  # build only) — push comes in Phase 1.3 when the VPS target exists.
  build:
    name: "Build — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test                # only build if tests pass
    strategy:
      matrix:
        service: [inventory, pos, crm]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables multi-platform builds and advanced caching

      - name: Build Docker image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: false          # build only — no registry push yet
          tags: |
            shaja-al-zahabi-${{ matrix.service }}-service:latest
            shaja-al-zahabi-${{ matrix.service }}-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # DevOps note: GitHub Actions cache (type=gha) dramatically speeds
          # up subsequent builds by caching Docker layer cache across runs

  # ── Job 3: Security audit ────────────────────────────────────────────────────
  security:
    name: "Security audit — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory, pos, crm]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=high
        # Fails only on HIGH or CRITICAL vulnerabilities — moderate/low are warnings
        # DevOps learning: supply chain security is a real production concern
        continue-on-error: true   # warn but don't fail CI on audit issues for now
